# Critical SPA config: all routes fall back to index.html so React
# Router handles them, not Nginx. Without this, refreshing on
# /patients/5 returns a 404 from Nginx instead of loading the app.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
